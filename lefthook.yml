pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: "*.{ts,tsx}"
      run: pnpm eslint {staged_files}

    - name: format check
      glob: "*.{ts,tsx,json,md,yml,yaml}"
      run: pnpm prettier --check {staged_files}

    - name: typecheck
      run: pnpm typecheck

pre-push:
  parallel: true
  jobs:
    - name: test
      run: pnpm test:run
