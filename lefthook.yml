pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: "**/*.{ts,tsx}"
      exclude: "(dist|node_modules)"
      run: pnpm eslint {staged_files}

    - name: format
      glob: "**/*.{ts,tsx,json,md,yml,yaml}"
      exclude: "(dist|node_modules|pnpm-lock\\.yaml)"
      stage_fixed: true
      run: pnpm prettier --write --ignore-unknown {staged_files}

    - name: typecheck
      run: pnpm typecheck

pre-push:
  parallel: true
  jobs:
    - name: test
      run: pnpm test:run
